spring.application.name=bakeflow

# Configurações do banco de dados
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bakeflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Configurações JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Configurações do servidor
server.port=8080
server.error.include-message=always
bakeflow.fidelizacao-service.url=${FIDELIZACAO_SERVICE_URL:http://localhost:8081}
bakeflow.notificacao-service.url=${NOTIFICACAO_SERVICE_URL:http://localhost:8082}

# Hibernate SQL logging (temporarily enable to inspect DDL/SQL during startup)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.tool.schema=DEBUG

# (Removed explicit dialect/storage_engine ? let Hibernate/Spring Boot choose defaults)
# application.properties
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false